<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sportfreund</title>
<style>
body{margin:0;background:#ececec;font-family:Arial,sans-serif}
.app{display:flex;gap:18px;padding:16px}
.left{flex:1}
.right{width:360px}
.header{display:flex;align-items:center;gap:14px;background:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.header img{height:46px}
.header h1{margin:0;color:#c00000;font-size:46px}
.section{background:#fff;margin-top:16px;padding:14px;border-radius:12px}
.row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.name{flex:1}
.note{font-size:12px;color:#666}
.btn{width:52px;height:52px;font-size:28px;border-radius:10px}
.count{width:42px;text-align:center;font-size:28px;font-weight:bold}
.panel{background:#fff;border:2px solid #c00000;border-radius:12px;overflow:hidden}
.panel h2{margin:0;background:#c00000;color:#fff;padding:10px}
.box{padding:12px}
.total{font-size:56px;color:#c00000;font-weight:bold;text-align:right}
.change{font-size:48px;color:#0a9a2a;font-weight:bold;text-align:right}
.group{background:#fff;border-radius:12px;padding:10px;margin-top:12px}
.group h3{margin:0 0 10px;color:#666}
.money{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.money button{height:56px;font-size:20px}
.del{width:100%;margin-top:8px;height:54px}
.paid{margin-top:12px;background:#0d47c7;color:#fff;border-radius:12px;padding:10px;text-align:center}
.paid .v{font-size:46px;font-weight:bold}
.reset{margin-top:14px;width:100%;height:58px;font-size:28px;color:#b00}
.icon{display:inline-block;width:22px;text-align:center}
</style>
</head>
