<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Abrechnung</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:0}
.wrap{max-width:760px;margin:auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header h1{margin:0;font-size:28px}
#gesamt{font-size:40px;font-weight:bold;color:#b30000}
h2{font-size:20px;margin:8px 0 2px;padding-left:0;text-align:left;}
.row{display:grid;grid-template-columns:150px 50px 36px 50px;align-items:center;column-gap:3px;justify-content:start;margin:2px 0;}
.info{display:flex;flex-direction:column;width:150px;}
.name{font-size:20px}
.note{font-size:11px;color:#666}
button{width:46px;height:46px;font-size:24px;color:#000}
.count{text-align:center;font-size:20px;font-weight:bold}
.reset{display:block;width:220px;margin:4px auto;padding:12px;font-size:18px;font-weight:bold;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>🔥 Sportfreund</h1>
<div id="summaryBox" style="position:fixed;top:10px;right:200px;width:205px;background:#fff;border:2px solid #b30000;border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.2);z-index:9999;">
<div style="background:#b30000;color:#fff;font-size:20px;font-weight:bold;padding:4px 8px;">Abrechnung</div>

<div style="padding:4px 8px;border-bottom:1px solid #ddd;">
<div style="font-size:15px;color:#555;">Gesamt</div>
<div id="gesamt" style="font-size:38px;font-weight:bold;color:#b30000;text-align:right;">0,00 €</div>
</div>

<div style="background:#e8f2ff;padding:4px 8px;border-bottom:1px solid #ddd;">
<div style="font-size:15px;color:#0d47a1;">Bezahlt</div>
<div id="bezahltAnzeige" style="font-size:30px;font-weight:bold;color:#0d47a1;text-align:right;">0,00 €</div>
</div>

<div style="background:#e9f9ec;padding:4px 8px;">
<div style="font-size:15px;color:#0b7a0b;">Rückgeld</div>
<div id="rueckgeldTop" style="font-size:34px;font-weight:bold;color:#0b7a0b;text-align:right;">0,00 €</div>
</div>
</div>
</div>

<h2>🥤 Getränke</h2>
<div class="row"><div class="info"><div class="name">Getränke 2,50 €</div><div class="note">zzgl. Pfand</div></div><button onclick="plus('g250',2.5)">+</button><div id="g250" class="count">0</div><button onclick="minus('g250',2.5)">−</button></div>
<div class="row"><div class="info"><div class="name">Getränke 2,00 €</div><div class="note">zzgl. Pfand</div></div><button onclick="plus('g200',2.0)">+</button><div id="g200" class="count">0</div><button onclick="minus('g200',2.0)">−</button></div>
<div class="row"><div class="info"><div class="name">Getränke 1,00 €</div><div class="note">zzgl. Pfand</div></div><button onclick="plus('g100',1.0)">+</button><div id="g100" class="count">0</div><button onclick="minus('g100',1.0)">−</button></div>

<h2>🍽️ Essen</h2>
<div class="row"><div class="info"><div class="name">Essen 3,50 €</div></div><button onclick="plus('e350',3.5)">+</button><div id="e350" class="count">0</div><button onclick="minus('e350',3.5)">−</button></div>
<div class="row"><div class="info"><div class="name">Essen 3,00 €</div></div><button onclick="plus('e300',3)">+</button><div id="e300" class="count">0</div><button onclick="minus('e300',3)">−</button></div>
<div class="row"><div class="info"><div class="name">Essen 2,50 €</div></div><button onclick="plus('e250',2.5)">+</button><div id="e250" class="count">0</div><button onclick="minus('e250',2.5)">−</button></div>
<div class="row"><div class="info"><div class="name">Essen 2,00 €</div></div><button onclick="plus('e200',2)">+</button><div id="e200" class="count">0</div><button onclick="minus('e200',2)">−</button></div>

<h2>♻️ Pfand</h2>
<div class="row"><div class="info"><div class="name">Pfand zurück</div></div><button onclick="pfp()">+</button><div id="pf" class="count">0</div><button onclick="pfm()">−</button></div>

<div style="margin:6px 0 12px 150px;position:relative;">
<label style="font-size:12px;color:#666;">Pfandwert pro Getränk</label><br>
<button id="pfandAuswahl" onclick="togglePfandPopup()" style="width:170px;height:36px;font-size:16px;text-align:left;padding:0 10px;">Pfand: 20 ct ▼</button>
<div id="pfandPopup" style="display:none;position:absolute;top:42px;left:0;background:#fff;border:1px solid #999;border-radius:8px;padding:4px;box-shadow:0 3px 10px rgba(0,0,0,.25);z-index:1000;">
<button style="display:block;width:160px;height:34px;font-size:14px;" onclick="setPfand(0)">Kein Pfand</button>
<button style="display:block;width:160px;height:34px;font-size:14px;" onclick="setPfand(0.2)">20 ct</button>
<button style="display:block;width:160px;height:34px;font-size:14px;" onclick="setPfand(0.3)">30 ct</button>
<button style="display:block;width:160px;height:34px;font-size:14px;" onclick="setPfand(0.5)">50 ct</button>
</div>
</div>
<div style="margin:15px 0;padding:12px;border:1px solid #ccc;border-radius:8px;background:#fff;">
<h2 style="color:#fff;">Bezahlt</h2>

<div style="position:absolute;right:200px;top:260px;display:flex;gap:6px;z-index:9998;">
<div style="display:flex;flex-direction:column;gap:6px;">
<button style="width:76px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(0.1)">10 ct</button>
<button style="width:76px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(0.2)">20 ct</button>
<button style="width:76px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(0.5)">50 ct</button>
<button style="width:76px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(1)">1 €</button>
<button style="width:76px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(2)">2 €</button>
</div>
<div style="display:flex;flex-direction:column;gap:6px;">
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(5)">5 €</button>
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(10)">10 €</button>
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(20)">20 €</button>
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(50)">50 €</button>
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="setBezahlt(100)">100 €</button>
<button style="width:88px;height:48px;font-size:20px;color:#000;" onclick="clearBezahlt()">Löschen</button>
</div>
</div>

<input id="bezahlt" type="hidden" value="0">

<span id="rueckgeld" style="display:none">0,00 €</span>
</div>

<button class="reset" onclick="resetAll()">Neuer Vorgang</button>
</div>

<script>
let sum=0;
let bezahlt=0;
let pfandwert=0.20;
const c={g250:0,g200:0,g100:0,e350:0,e300:0,e250:0,e200:0,pf:0};

function sync(){
  document.getElementById('gesamt').textContent=sum.toFixed(2).replace('.',',')+' €';
  document.getElementById('bezahlt').value=bezahlt;
  document.getElementById('bezahltAnzeige').textContent=bezahlt.toFixed(2).replace('.',',')+' €';
  const rueck=Math.max(0,bezahlt-sum).toFixed(2).replace('.',',')+' €';
  document.getElementById('rueckgeld').textContent=rueck;
  document.getElementById('rueckgeldTop').textContent=rueck;
  Object.keys(c).forEach(k=>document.getElementById(k).textContent=c[k]);
}
function togglePfandPopup(){
 const p=document.getElementById('pfandPopup');
 p.style.display=p.style.display==='block'?'none':'block';
}
function setPfand(v){
 pfandwert=v;
 localStorage.setItem('pfandwert',v);
 document.getElementById('pfandAuswahl').textContent='Pfand: '+(v===0?'Kein Pfand':Math.round(v*100)+' ct')+' ▼';
 document.getElementById('pfandPopup').style.display='none';
}
function plus(id,p){c[id]++;sum+=p;if(id.startsWith('g'))sum+=pfandwert;sync();}
function minus(id,p){if(c[id]){c[id]--;sum-=p;if(id.startsWith('g'))sum-=pfandwert;sync();}}
function pfp(){c.pf++;sum-=pfandwert;sync();}
function pfm(){if(c.pf){c.pf--;sum+=pfandwert;sync();}}
function setBezahlt(v){bezahlt+=v;sync();}
function clearBezahlt(){bezahlt=0;sync();}
function resetAll(){sum=0;bezahlt=0;Object.keys(c).forEach(k=>c[k]=0);sync();}
const s=parseFloat(localStorage.getItem('pfandwert'));
setPfand(isNaN(s)?0.2:s);
sync();
</script>
</body>
</html>
