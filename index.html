
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sportfreund</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
.wrap{display:grid;grid-template-columns:1fr 280px;gap:24px;max-width:1250px;margin:auto;padding:20px}
h1{font-size:46px;margin:0 0 20px}
.section{margin-bottom:24px}
.row{display:grid;grid-template-columns:230px 60px 50px 60px;gap:8px;align-items:center;margin:8px 0}
button{height:52px;font-size:24px;border-radius:8px}
.count{text-align:center;font-size:28px;font-weight:bold}
.panel{border:2px solid #b30000;border-radius:14px;background:#fff;overflow:hidden}
.panel h2{margin:0;background:#b30000;color:#fff;padding:10px 14px}
.box{padding:14px}
.total{font-size:60px;color:#c00000;font-weight:bold;text-align:right}
.changeTitle{margin-top:18px;color:#0b8d2a;font-size:22px;font-weight:bold}
.change{font-size:56px;color:#0b8d2a;font-weight:bold;text-align:right}
.money{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px}
.money button{font-size:22px;height:48px}
.delete{grid-column:2}
.paidbox{margin-top:14px;border:2px solid #0b8d2a;border-radius:10px;background:#fff;padding:10px;text-align:center}
.paidbox .t{font-size:18px;color:#555}
.paidbox .v{font-size:42px;color:#0b8d2a;font-weight:bold}
.reset{margin-top:28px;width:100%;height:56px;font-size:24px}
</style>
</head>
<body>
<div class="wrap">
<div>
<h1>🔥 Sportfreund</h1>

<div class="section"><h2>🥤 Getränke</h2>
<div class="row"><div>Getränke 2,50 €<br><small>zzgl. Pfand</small></div><button>-</button><div class="count">0</div><button>+</button></div>
<div class="row"><div>Getränke 2,00 €<br><small>zzgl. Pfand</small></div><button>-</button><div class="count">0</div><button>+</button></div>
<div class="row"><div>Getränke 1,00 €<br><small>zzgl. Pfand</small></div><button>-</button><div class="count">0</div><button>+</button></div>
</div>

<div class="section"><h2>🍽️ Essen</h2>
<div class="row"><div>Essen 3,50 €</div><button>-</button><div class="count">0</div><button>+</button></div>
<div class="row"><div>Essen 3,00 €</div><button>-</button><div class="count">0</div><button>+</button></div>
<div class="row"><div>Essen 2,50 €</div><button>-</button><div class="count">0</div><button>+</button></div>
<div class="row"><div>Essen 2,00 €</div><button>-</button><div class="count">0</div><button>+</button></div>
</div>

<div class="section"><h2>♻️ Pfand</h2>
<div class="row"><div>Pfand zurück</div><button>-</button><div class="count">0</div><button>+</button></div>
</div>

<button class="reset">Neuer Vorgang</button>
</div>

<div>
<div class="panel">
<h2>Abrechnung</h2>
<div class="box">
<div>Gesamt</div>
<div class="total">0,00 €</div>
<div class="changeTitle">Rückgeld</div>
<div class="change">0,00 €</div>
</div>
</div>

<div class="money">
<button>10 ct</button><button>5 €</button>
<button>20 ct</button><button>10 €</button>
<button>50 ct</button><button>20 €</button>
<button>1 €</button><button>50 €</button>
<button>2 €</button><button>100 €</button>
<button></button><button class="delete">Löschen</button>
</div>

<div class="paidbox">
<div class="t">Bezahlt</div>
<div class="v">0,00 €</div>
</div>

</div>
</div>
<script>
document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
</script>
</body>
</html>
