<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sportfreund Tab E</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;
  width:1280px;height:800px;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#efefef;
}
.container{
  display:grid;
  grid-template-columns:900px 360px;
  gap:20px;
  padding:15px;
  height:800px;
}
h1{margin:0 0 10px;font-size:42px}
h2{margin:10px 0 6px;font-size:28px}
.left{overflow:hidden}
.row{
 display:grid;
 grid-template-columns:320px 80px 70px 80px;
 align-items:center;
 gap:8px;
 margin:6px 0;
}
.name{font-size:26px}
small{font-size:16px;color:#666}
button{
 height:68px;
 border-radius:12px;
 border:1px solid #999;
 font-size:34px;
 font-weight:bold;
 background:#fff;
}
.count{font-size:34px;text-align:center;font-weight:bold}
.reset{margin-top:18px;width:560px;height:72px;font-size:30px}

.panel{
background:#fff;
border:2px solid #b30000;
border-radius:14px;
overflow:hidden;
}
.panelhead{
background:#b30000;
color:#fff;
padding:10px;
font-size:28px;
font-weight:bold;
}
.box{padding:14px}
.total{font-size:64px;color:#c00000;font-weight:bold;text-align:right}
.rtitle{font-size:24px;color:#0b8d2a;font-weight:bold;margin-top:18px}
.rgeld{font-size:58px;color:#0b8d2a;font-weight:bold;text-align:right}

.money{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:14px;
}
.money button{height:62px;font-size:24px}
.paid{
margin-top:12px;
border:2px solid #1565c0;
border-radius:12px;
padding:10px;
text-align:center;
background:#fff;
}
.paid .t{font-size:20px;color:#1565c0}
.paid .v{font-size:44px;color:#1565c0;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div class="left">
<h1>🔥 Sportfreund</h1>

<h2>🥤 Getränke</h2>
<div class="row"><div class="name">Getränke 2,50 €<br><small>zzgl. Pfand</small></div><button>+</button><div class="count">0</div><button>−</button></div>
<div class="row"><div class="name">Getränke 2,00 €<br><small>zzgl. Pfand</small></div><button>+</button><div class="count">0</div><button>−</button></div>
<div class="row"><div class="name">Getränke 1,00 €<br><small>zzgl. Pfand</small></div><button>+</button><div class="count">0</div><button>−</button></div>

<h2>🍽️ Essen</h2>
<div class="row"><div class="name">Essen 3,50 €</div><button>+</button><div class="count">0</div><button>−</button></div>
<div class="row"><div class="name">Essen 3,00 €</div><button>+</button><div class="count">0</div><button>−</button></div>
<div class="row"><div class="name">Essen 2,50 €</div><button>+</button><div class="count">0</div><button>−</button></div>
<div class="row"><div class="name">Essen 2,00 €</div><button>+</button><div class="count">0</div><button>−</button></div>

<h2>♻️ Pfand</h2>
<div class="row"><div class="name">Pfand zurück</div><button>+</button><div class="count">0</div><button>−</button></div>

<button class="reset">Neuer Vorgang</button>
</div>

<div>
<div class="panel">
<div class="panelhead">Abrechnung</div>
<div class="box">
<div>Gesamt</div>
<div class="total">0,00 €</div>
<div class="rtitle">Rückgeld</div>
<div class="rgeld">0,00 €</div>
</div>
</div>

<div class="money">
<button>10 ct</button><button>5 €</button>
<button>20 ct</button><button>10 €</button>
<button>50 ct</button><button>20 €</button>
<button>1 €</button><button>50 €</button>
<button>2 €</button><button>100 €</button>
<button></button><button>Löschen</button>
</div>

<div class="paid">
<div class="t">Bezahlt</div>
<div class="v">0,00 €</div>
</div>
</div>
</div>
</body>
</html>
