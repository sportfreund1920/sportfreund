<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grillhütte</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:0}
.wrap{max-width:620px;margin:auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header h1{margin:0;font-size:28px}
#gesamt{font-size:40px;font-weight:bold;color:#b30000}
h2{font-size:20px;margin:8px 0 2px;padding-left:0;text-align:left;}
.row{display:grid;grid-template-columns:150px 50px 36px 50px;align-items:center;column-gap:3px;justify-content:start;margin:2px 0;}
.info{display:flex;flex-direction:column;width:150px;}
.name{font-size:20px}
.note{font-size:11px;color:#666}
button{width:46px;height:46px;font-size:24px}
.count{text-align:center;font-size:20px;font-weight:bold}
.reset{display:block;width:220px;margin:4px auto;padding:12px;font-size:18px;font-weight:bold;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>🔥 Sportfreund</h1>
<div style="display:flex;align-items:center;gap:12px;">
<span style="font-size:22px;font-weight:bold;">Grillhütte</span>
<div id="gesamt">0,00 €</div>
</div>
</div>

<h2>🥤 Getränke</h2>
<div class="row"><div class="info"><div class="name">Getränke 2,50 €</div><div class="note">zzgl. Pfand</div></div><button onclick="minus('g250',2.5)">−</button><div id="g250" class="count">0</div><button onclick="plus('g250',2.5)">+</button></div>
<div class="row"><div class="info"><div class="name">Getränke 2,00 €</div><div class="note">zzgl. Pfand</div></div><button onclick="minus('g200',2.0)">−</button><div id="g200" class="count">0</div><button onclick="plus('g200',2.0)">+</button></div>
<div class="row"><div class="info"><div class="name">Getränke 1,00 €</div><div class="note">zzgl. Pfand</div></div><button onclick="minus('g100',1.0)">−</button><div id="g100" class="count">0</div><button onclick="plus('g100',1.0)">+</button></div>

<h2>🍽️ Essen</h2>
<div class="row"><div class="info"><div class="name">Essen 3,50 €</div></div><button onclick="minus('e350',3.5)">−</button><div id="e350" class="count">0</div><button onclick="plus('e350',3.5)">+</button></div>
<div class="row"><div class="info"><div class="name">Essen 3,00 €</div></div><button onclick="minus('e300',3)">−</button><div id="e300" class="count">0</div><button onclick="plus('e300',3)">+</button></div>
<div class="row"><div class="info"><div class="name">Essen 2,50 €</div></div><button onclick="minus('e250',2.5)">−</button><div id="e250" class="count">0</div><button onclick="plus('e250',2.5)">+</button></div>
<div class="row"><div class="info"><div class="name">Essen 2,00 €</div></div><button onclick="minus('e200',2)">−</button><div id="e200" class="count">0</div><button onclick="plus('e200',2)">+</button></div>

<h2>♻️ Pfand</h2>
<div class="row"><div class="info"><div class="name">Pfand zurück</div></div><button onclick="pfm()">−</button><div id="pf" class="count">0</div><button onclick="pfp()">+</button></div>

<div style="margin:6px 0 12px 150px;">
<label style="font-size:12px;color:#666;">Pfandwert pro Getränk</label><br>
<input id="pfandwert" type="number" step="0.01" value="0.00" style="width:80px;">
</div>





<div style="margin:15px 0;padding:12px;border:1px solid #ccc;border-radius:8px;background:#fff;">
<h2>💶 Bezahlt</h2>

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
<button style="width:90px;" onclick="setBezahlt(5)">5 €</button>
<button style="width:90px;" onclick="setBezahlt(10)">10 €</button>
<button style="width:90px;" onclick="setBezahlt(20)">20 €</button>
<button style="width:90px;" onclick="setBezahlt(50)">50 €</button>
<button style="width:90px;" onclick="setBezahlt(100)">100 €</button>
<button style="width:120px;" onclick="clearBezahlt()">Löschen</button>
</div>

<div style="margin-bottom:10px;">
<input id="bezahlt" type="number" step="0.01" placeholder="Eigener Betrag"
 style="font-size:20px;padding:6px;width:170px;">
<button onclick="berechneRueckgeld()" style="width:auto;height:auto;padding:8px 12px;font-size:18px;">Berechnen</button>
</div>

<div style="font-size:24px;font-weight:bold;">
Rückgeld: <span id="rueckgeld">0,00 €</span>
</div>
</div>

<button class="reset" onclick="resetAll()">Neuer Vorgang</button>
</div>

<script>
let sum=0;
const c={g250:0,g200:0,g100:0,e350:0,e300:0,e250:0,e200:0,pf:0};
function update(){gesamt.textContent=sum.toFixed(2).replace(".",",")+" €";for(const k in c)document.getElementById(k).textContent=c[k]}
function plus(id,p){
 const pf=parseFloat(document.getElementById('pfandwert')?.value||0);
 c[id]++;sum+=p;
 if(id.startsWith('g')) sum+=pf;
 update();
}
function minus(id,p){
 if(c[id]>0){
  const pf=parseFloat(document.getElementById('pfandwert')?.value||0);
  c[id]--;sum-=p;
  if(id.startsWith('g')) sum-=pf;
  update();
 }
}
function pfp(){
 const pf=parseFloat(document.getElementById('pfandwert')?.value||0);
 c.pf++;sum-=pf;update();
}
function pfm(){
 const pf=parseFloat(document.getElementById('pfandwert')?.value||0);
 if(c.pf>0){c.pf--;sum+=pf;update();}
}
function resetAll(){sum=0;for(const k in c)c[k]=0;update();}

function berechneRueckgeld(){
  const bezahlt=parseFloat(document.getElementById('bezahlt').value.replace(',','.'))||0;
  const rueck=bezahlt-sum;
  document.getElementById('rueckgeld').textContent=
    (rueck>=0?rueck:0).toFixed(2).replace('.',',')+' €';
}


function zeigeRueckgeld(bez){
 const r=Math.max(0,bez-sum);
 document.getElementById('bezahlt').value=bez.toFixed(2);
 document.getElementById('rueckgeld').textContent=r.toFixed(2).replace('.',',')+' €';
}
function setBezahlt(b){
 const feld=document.getElementById('bezahlt');
 const alt=parseFloat((feld.value||'0').replace(',','.'))||0;
 zeigeRueckgeld(alt+b);
}
function clearBezahlt(){
 zeigeRueckgeld(0);
}
function berechneRueckgeld(){
 const b=parseFloat((document.getElementById('bezahlt').value||'0').replace(',','.'))||0;
 zeigeRueckgeld(b);
}

update();
</script>
</body>
</html>
